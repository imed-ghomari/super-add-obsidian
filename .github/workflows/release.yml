name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-attest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify manifest version matches release tag
        if: github.event_name == 'release'
        run: |
          test "v$(node -p "require('./manifest.json').version")" = "${{ github.event.release.tag_name }}"

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            main.js
            manifest.json
            styles.css
          generate_release_notes: true

      - name: Attest main.js provenance
        if: github.event_name == 'release'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: main.js

      - name: Attest styles.css provenance
        if: github.event_name == 'release'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: styles.css
